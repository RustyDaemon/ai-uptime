name: ai_uptime
description: Desktop tray app that monitors public status pages for Claude, GitHub, OpenAI, and Cursor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.3.3
  tray_manager: ^0.5.2
  window_manager: ^0.5.1
  flutter_local_notifications: ^21.0.0
  url_launcher: ^6.3.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  image: ^4.3.0

flutter:
  uses-material-design: false
  assets:
    - assets/tray/
